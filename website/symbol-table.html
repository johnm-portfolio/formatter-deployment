<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="John McNally">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symbol Table</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body class="dark-theme-main">
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li>Symbol table</li>
        <li><a href="online-formatter.html">Format online</a></li>
        <ul><li><i>(The download will not work on Netlify)</i></li></ul>
      </ul>
    </nav>
    <hr>

    <h1>Symbol Table</h1>
    <button id="theme-button" class="dark-theme-button">
      <img src="images/dark_theme_button_icon.png" height="50rem">
    </button>

    <br>

    <label for="filter">Filter by category:</label>
    <select id="filter">
      <option value="all">All</option>
      <option value="algebra-symbols">Algebra Symbols</option>
      <option value="greek-letters">Greek Letters</option>
      <option value="set-symbols">Set Symbols</option>
      <option value="formulae-notation">LaTeX Notation</option>
      <option value="logic-symbols">Logic Symbols</option>
      <option value="mathematical-symbols">Mathematical Symbols</option>
      <option value="other">Other</option>
    </select>

    <table id="symbol-table">
      <thead id="symbol-table-head" class="dark-theme-table-heading">
        <tr>
          <th>Symbol</th>
          <th>Representation</th>
          <th>Description</th>
        </tr>
      </thead>

      <tbody id="symbol-table-body" class="dark-theme-table-body">
    </table>

    <table id="formula-table">
      <thead id="formula-table-head" class="dark-theme-table-heading">
        <tr>
          <th>Pattern</th>
          <th>Replacement</th>
          <th>Description</th>
        </tr>
      </thead>

      <tbody id="formula-table-body" class="dark-theme-table-body">
    </table>

    <script src="script.js"></script>
  </body>
</html>
